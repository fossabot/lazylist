<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LazyList</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>LazyList</h1>

  <section id="auth">
    <h2>Acesso</h2>
    <input id="email" placeholder="email">
    <input id="password" type="password" placeholder="senha">
    <input id="username" placeholder="nome (apenas cadastro)">
    <button onclick="register()">Cadastrar</button>
    <button onclick="login()">Entrar</button>
  </section>

  <section id="app" style="display:none">
    <button onclick="logout()">Sair</button>
    <h2>Nova tarefa</h2>
    <input id="title" placeholder="título">
    <input id="description" placeholder="descrição">
    <input id="due_date" type="date">
    <button onclick="createTask()">Adicionar</button>

    <h2>Minhas tarefas</h2>
    <input id="filter_date" type="date">
    <button onclick="loadTasks()">Filtrar</button>
    <button onclick="loadTasks(true)">Limpar filtro</button>
    <ul id="tasks"></ul>
  </section>

  <p id="msg"></p>
  <script src="app.js"></script>
</body>
</html>
